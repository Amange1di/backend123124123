services:
  - type: web
    name: edudata-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: bash -lc "python manage.py migrate && python -m gunicorn backend.wsgi:application --log-file - --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: false
        sync: false
      - key: SECRET_KEY
        generateValue: true
        sync: false
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
        fromService:
          type: frontend
          property: url
          prefix: https://
