services:
  - type: web
    name: edudata-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG
        value: false
        sync: false
      - key: SECRET_KEY
        generateValue: true
        sync: false
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
        sync: false
      - key: DATABASE_URL
        fromService:
          type: database
          name: edudata-db
          property: connectionString
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://frontend123123123.vercel.app,http://localhost:3000"
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://frontend123123123.vercel.app,http://localhost:3000,https://*.onrender.com"
        sync: false
    disk:
      name: edudata-data
      mountPath: /opt/render/project/src

databases:
  - name: edudata-db
    databaseName: edudata
    user: edudata_user
